{% extends 'base.html' %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-75 align-items-center py-5">
        <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
            <div class="card border-0 shadow-lg">
                <div class="card-body text-center p-4 p-sm-5">
                    <!-- Код ошибки большими буквами -->
                    <h1 class="display-1 fw-bold text-primary mb-3" style="font-size: clamp(4rem, 15vw, 6rem);">404</h1>
                    
                    <!-- Иконка -->
                    <div class="mb-3">
                        <i class="bi bi-compass text-warning" style="font-size: 2rem;"></i>
                    </div>
                    
                    <!-- Краткое описание -->
                    <p class="text-muted mb-4 px-2" style="font-size: clamp(0.9rem, 2vw, 1.1rem);">
                        Страница не найдена.<br>
                        Проверьте правильность введенного адреса.
                    </p>
                    
                    <!-- Кнопка -->
                    <a href="{% url 'project_list' %}" class="btn btn-primary px-4 py-2">
                        <i class="bi bi-house-door me-1"></i> На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.min-vh-75 { min-height: 75vh; }
.shadow-lg { box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.05) !important; }
@media (max-width: 576px) {
    .min-vh-75 { min-height: 80vh; }
    .card-body { padding: 2rem 1.5rem !important; }
}
@media (min-width: 1200px) { .min-vh-75 { min-height: 70vh; } }
</style>
{% endblock %}
