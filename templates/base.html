<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Управление проектами{% endblock %}</title>
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <style>
        body { padding-top: 20px; }
        .navbar { margin-bottom: 20px; }
        .progress { height: 25px; }
        .project-card { transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .status-not_started { background-color: #f8f9fa; }
        .status-in_progress { background-color: #cff4fc; }
        .status-on_review { background-color: #fff3cd; }
        .status-completed { background-color: #d1e7dd; }
        .status-blocked { background-color: #f8d7da; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'project_list' %}">Управление проектами</a>
            {% if user.is_authenticated %}
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">Привет, {{ user.username }}!</span>
                <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Выйти</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% bootstrap_messages %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
